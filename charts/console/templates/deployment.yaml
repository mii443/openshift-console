apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "console.fullname" . }}
  labels:
    {{- include "console.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "console.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "console.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "console.serviceAccountName" . }}
      automountServiceAccountToken: true
      containers:
        - name: bridge
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ required "image.tag is required" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /opt/bridge/bin/bridge
          args:
            - --public-dir=/opt/bridge/static
            - --user-auth=disabled
            - --user-settings-location={{ .Values.userSettingsLocation }}
            {{- if .Values.plugins.enabled }}
            {{- range .Values.plugins.entries }}
            - --plugins={{ .name }}={{ .endpoint }}
            {{- end }}
            {{- $pluginOrder := include "console.pluginOrder" . }}
            {{- if $pluginOrder }}
            - --plugins-order={{ $pluginOrder }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: 9000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
